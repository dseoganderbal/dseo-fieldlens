<style>
    /* ---------------------------------------------------
       USER MANAGEMENT PAGE STYLES
       --------------------------------------------------- */
    .um-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
    }

    .um-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-primary);
    }

    .um-sub {
        font-size: 14px;
        color: var(--text-muted);
    }

    .um-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 24px;
    }

    .um-table-wrapper {
        overflow-x: auto;
    }

    .um-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }

    .um-table th {
        background: var(--bg);
        color: var(--text-secondary);
        font-weight: 600;
        text-align: left;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 0.5px;
    }

    .um-table td {
        padding: 16px;
        border-bottom: 1px solid var(--border);
        color: var(--text-primary);
        vertical-align: middle;
    }

    .um-table tr:last-child td {
        border-bottom: none;
    }

    .um-role-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 99px;
        font-size: 12px;
        font-weight: 600;
    }

    .um-role-Admin { background: rgba(99, 102, 241, 0.1); color: #6366f1; border: 1px solid rgba(99, 102, 241, 0.2); }
    .um-role-DataAdministrator { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
    .um-role-DataEntry { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); } /* Legacy support */
    .um-role-Verifier { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
    .um-role-Viewer { background: rgba(100, 116, 139, 0.1); color: #64748b; border: 1px solid rgba(100, 116, 139, 0.2); }

    .um-status-Active { color: #10b981; font-weight: 600; }
    .um-status-Inactive { color: #ef4444; font-weight: 600; }

    .um-actions {
        display: flex;
        gap: 8px;
    }

    .um-btn-icon {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
    }

    .um-btn-icon:hover {
        background: var(--border-hover);
        color: var(--text-primary);
    }
    
    .um-btn-icon.danger:hover {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border-color: rgba(239, 68, 68, 0.3);
    }
</style>

<div class="page-container" id="page-UserManagement">
    <div class="um-header">
        <div>
            <div class="um-title">User Management</div>
            <div class="um-sub">Add, edit, or remove portal users and their roles</div>
        </div>
        <button class="btn btn-primary" onclick="openUserModal()">
            <i class="fa-solid fa-user-plus"></i> Add New User
        </button>
    </div>

    <div class="um-card">
        <div class="um-table-wrapper">
            <table class="um-table">
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="5" style="text-align:center; padding: 32px;"><i class="fa-solid fa-spinner fa-spin"></i> Loading users...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- USER MODAL -->
<div class="modal-overlay" id="umModalOverlay" onclick="closeUserModal()"></div>
<div class="modal" id="umModal">
    <div class="modal-header">
        <div class="modal-title-wrap">
            <div class="modal-icon"><i class="fa-solid fa-user-shield"></i></div>
            <div>
                <div class="modal-title" id="umModalTitle">Add User</div>
                <div class="modal-sub">Enter user details and assign a role</div>
            </div>
        </div>
        <button class="modal-close" onclick="closeUserModal()" title="Close">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
    <div class="modal-body">
        <form class="wd-form-view" id="umForm" onsubmit="event.preventDefault(); saveUser();">
            <input type="hidden" id="umMode" value="add" />
            
            <div class="form-row">
                <div class="form-field">
                    <label class="field-label">User ID (Username)</label>
                    <input type="text" class="form-control" id="umUserId" required placeholder="e.g. jdoe" />
                </div>
                <div class="form-field">
                    <label class="field-label">Password</label>
                    <input type="text" class="form-control" id="umPassword" required placeholder="Enter secure password" />
                </div>
            </div>
            
            <div class="form-row full">
                <div class="form-field">
                    <label class="field-label">Full Name</label>
                    <input type="text" class="form-control" id="umName" required placeholder="John Doe" />
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-field">
                    <label class="field-label">Role</label>
                    <select class="form-select" id="umRole" required>
                        <option value="">Select a role...</option>
                        <option value="Admin">Admin (Full Access)</option>
                        <option value="Data Administrator">Data Administrator</option>
                        <option value="Verifier">Verifier (Field Officer)</option>
                        <option value="Viewer">Viewer (Read Only)</option>
                    </select>
                </div>
                <div class="form-field">
                    <label class="field-label">Status</label>
                    <select class="form-select" id="umStatus" required>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive (Suspended)</option>
                    </select>
                </div>
            </div>
            
            <div style="margin-top:24px; display:flex; justify-content:flex-end; gap:12px;">
                <button type="button" class="btn btn-outline" onclick="closeUserModal()">Cancel</button>
                <button type="submit" class="btn btn-primary" id="umSubmitBtn">Save User</button>
            </div>
        </form>
    </div>
</div>
