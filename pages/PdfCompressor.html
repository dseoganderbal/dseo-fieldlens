<div class="page-header" style="margin-bottom: 24px;">
    <h2 style="font-weight:700; color:var(--text-primary);">PDF Compressor</h2>
    <div style="color:var(--text-muted); font-size:14px;">Rasterize and compress PDF documents locally before upload. Warning: text selectability will be lost.</div>
</div>

<div class="compressor-container">
    <div class="compressor-settings panel">
        <h3 class="panel-title"><i class="fa-solid fa-sliders"></i> Settings</h3>
        
        <div class="form-field">
            <label class="field-label">Target Max Size (KB)</label>
            <input type="number" id="pcTargetSize" class="form-control" placeholder="e.g. 2000" value="2000">
            <div class="field-hint">Auto-adjusts quality to hit this limit.</div>
        </div>
        
        <div class="form-field" style="margin-top:20px;">
            <label class="field-label">Render DPI (Scale)</label>
            <select id="pcRenderDpi" class="form-select">
                <option value="1.0">Low (Fastest, Smallest)</option>
                <option value="1.5" selected>Standard (Recommended)</option>
                <option value="2.0">High (Slower, Larger)</option>
            </select>
        </div>

        <div class="form-field" style="margin-top:20px;">
            <label class="field-label">JPEG Quality (0-100%)</label>
            <input type="range" id="pcQuality" min="1" max="100" value="70" class="form-range" style="width:100%;">
            <div id="pcQualityVal" style="text-align:right; font-size:12px; color:var(--text-muted);">70%</div>
        </div>

        <div class="form-row" style="margin-top:24px;">
            <button class="btn btn-primary" id="pcApplyBtn" style="flex:1;" onclick="pcApplyCompression()">Apply Settings</button>
            <button class="btn btn-outline" id="pcResetBtn" onclick="pcReset()">Reset Tool</button>
        </div>
    </div>

    <div class="compressor-workspace panel">
        <div id="pcUploadZone" class="upload-zone" onclick="document.getElementById('pcFileInput').click()">
            <i class="fa-regular fa-file-pdf" style="font-size:48px; color:var(--primary); margin-bottom:16px;"></i>
            <div style="font-weight:600; font-size:16px;">Click or Drag to Upload PDF</div>
            <div style="font-size:12px; color:var(--text-muted); margin-top:8px;">Rasterizes pages into compressed images</div>
            <input type="file" id="pcFileInput" accept="application/pdf" style="display:none;" onchange="pcHandleFileSelect(event)">
        </div>

        <div id="pcPreviewZone" class="preview-zone" style="display:none;">
            <div class="preview-split">
                <div class="preview-card" style="justify-content:center;">
                    <div class="preview-header">Original PDF</div>
                    <div id="pcOriginalStats" class="preview-stats" style="margin-top:0; font-size:15px; display:flex; flex-direction:column; gap:8px;">--</div>
                </div>
                <div class="preview-card" style="justify-content:center;">
                    <div class="preview-header" style="color:var(--success);">Compressed PDF</div>
                    <div id="pcCompressedStats" class="preview-stats" style="margin-top:0; font-size:15px; color:var(--success); font-weight:600; display:flex; flex-direction:column; gap:8px;">--</div>
                </div>
            </div>

            <!-- Progress Bar inside preview area -->
            <div id="pcProgressContainer" style="display:none; margin-top:32px;">
                <div style="font-weight:600; margin-bottom:8px; font-size:14px; text-align:center;" id="pcProgressLabel">Processing Page 1...</div>
                <div style="height:12px; background:var(--bg-primary); border-radius:6px; overflow:hidden; border:1px solid var(--border-color);">
                    <div id="pcProgressBar" style="height:100%; width:0%; background:var(--primary); transition:width 0.2s;"></div>
                </div>
            </div>

            <div class="action-buttons-row" id="pcActionButtons" style="display:none;">
                <button class="btn btn-success" id="pcDownloadBtn" onclick="pcDownload()" style="padding:12px 24px; font-size:16px; border-radius:8px;">
                    <i class="fa-solid fa-download"></i> Download Compressed PDF
                </button>
                <button class="btn btn-outline" onclick="pcReset()" style="padding:12px 24px; font-size:16px; border-radius:8px;">
                    <i class="fa-solid fa-arrow-rotate-left"></i> Upload New PDF
                </button>
            </div>
        </div>
    </div>
</div>
