        <!--    WORKS LIST PAGE    -->
        <div id="page-worksList">



            <!-- Toolbar -->
            <div class="wl-toolbar animate-in delay-1">
                <div class="wl-search-wrap">
                    <i class="fa-solid fa-magnifying-glass wl-search-icon"></i>
                    <input type="text" class="wl-search" id="wlSearch" placeholder="Search by workcode or name "
                        oninput="wlFilterAndRender()" />
                </div>
                <div class="wl-filter-group">
                  <select class="wl-filter-select" id="wlFilterworksyear" onchange="loadWorksData()">
                        <option value="Works-2025-26">Works-2025-26</option>
                        <option value="Works-2026-27">Works-2026-27</option>
                    </select>
                    <select class="wl-filter-select" id="wlFilterConstituency" onchange="wlFilterAndRender()">
                        <option value="">All Constituencies</option>
                        <option value="Ganderbal">Ganderbal</option>
                        <option value="Kangan">Kangan</option>
                    </select>
                    <select class="wl-filter-select" id="wlFilterDept" onchange="wlFilterAndRender()">
                        <option value="">All Departments</option>
                        <option value="RDD">RDD</option>
                        <option value="YSS">YSS</option>
                        <option value="KPDCL">KPDCL</option>
                        <option value="I&amp;FC">I&amp;FC</option>
                    </select>
                    <select class="wl-filter-select" id="wlFilterStatus" onchange="wlFilterAndRender()">
                        <option value="">All Status</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                        <option value="Pending">Pending</option>
                    </select>
                    <button class="btn btn-success" onclick="exportWorksExcel()"
                        style="font-size:13px; padding:9px 16px;">
                        <i class="fa-solid fa-file-excel"></i> Export
                    </button>
                </div>
            </div>

            <!-- Table card -->
            <div class="wl-table-card animate-in delay-2">
                <div class="table-responsive">
                    <table class="wl-table" id="wlTable">
                        <thead>
                            <tr>
                                <th>Workcode</th>
                                <th>Name of the Work</th>
                                <th>Constituency</th>
                                <th>Department</th>
                                <th>Executing Agency</th>
                                <th class="right">AA Cost (Lakhs)</th>
                                <th class="center">Status</th>
                                <th class="center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="wlTableBody"></tbody>
                    </table>
                </div>

                <!-- Empty state -->
                <div class="wl-empty" id="wlEmpty" style="display:none;">
                    <div class="wl-empty-icon"><i class="fa-solid fa-folder-open"></i></div>
                    <div class="wl-empty-text">No works found</div>
                    <div class="wl-empty-sub">Try adjusting your search or filter criteria.</div>
                </div>

                <div class="wl-footer">
                    <div class="wl-showing" id="wlShowing">Showing 1 to 10 of 0 entries</div>
                    <div class="pagination" id="wlPagination"></div>
                </div>
            </div>

        </div>
        <!-- END works list page -->
