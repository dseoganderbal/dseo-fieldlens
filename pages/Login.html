<style>
    /* ---------------------------------------------------
       NEW MODERN LOGIN PAGE STYLES (WAVE DESIGN)
       --------------------------------------------------- */
    .login-wrapper {
        min-height: 100vh;
        width: 100vw;
        background: #e2e4f0; /* Matches the light purple/grey background in the mockup */
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        font-family: 'Inter', sans-serif;
        padding: 20px; /* Ensures spacing on small devices */
        box-sizing: border-box;
    }

    .login-card {
        background: #ffffff;
        width: 100%;
        max-width: 420px; /* Slightly narrower to match mockup proportions */
        height: auto;
        max-height: 90vh;
        position: relative;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        border-radius: 32px; /* Restored rounded corners for all screens */
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Hide scrollbar for a cleaner app-like feel */
    .login-card::-webkit-scrollbar {
        display: none;
    }
    .login-card {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
    }

    /* Top Blue Wave Area */
    .login-top {
        background: linear-gradient(135deg, #0e2a8a, var(--accent));
        color: white;
        padding: 40px 30px 90px;
        position: relative;
        flex-shrink: 0;
    }

    .login-top-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }

    .login-title {
        font-size: 32px;
        font-weight: 800;
        margin: 0 0 8px 0;
        letter-spacing: -1px;
    }

    .login-subtitle {
        font-size: 13px;
        opacity: 0.9;
        line-height: 1.4;
        max-width: 200px;
    }

    .login-back-btn {
        background: white;
        color: var(--accent);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        cursor: pointer;
    }

    /* The SVG Wave overlay at the bottom of the blue area */
    .login-wave {
        position: absolute;
        bottom: -2px;
        /* Slight overlap to prevent gaps */
        left: 0;
        width: 100%;
        height: auto;
        z-index: 10;
    }

    /* Illustration Container */
    .login-illustration {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-top: 20px;
        margin-bottom: 20px;
        position: relative;
        z-index: 5;
    }

    .login-illustration i {
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
    }

    /* Bottom Form Area */
    .login-bottom {
        padding: 24px 30px 40px;
        flex-grow: 1;
        background: #ffffff;
        position: relative;
        z-index: 20;
        display: flex;
        flex-direction: column;
    }

    .login-form-group {
        margin-bottom: 20px;
    }

    .login-label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #475569;
        margin-bottom: 8px;
    }

    .input-wrapper {
        position: relative;
    }

    .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 15px;
    }

    .login-input {
        width: 100%;
        background: #ffffff;
        border: 1px solid #cbd5e1;
        color: #0f172a;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        padding: 14px 16px 14px 44px;
        /* Space for icon */
        border-radius: 12px;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .login-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-success-icon {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--accent);
        font-size: 14px;
        display: none;
    }

    .login-input:valid+.input-success-icon {
        display: block;
    }

    .login-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        font-size: 13px;
    }

    .remember-me {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #64748b;
        cursor: pointer;
    }

    .forgot-pwd {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
    }

    .login-btn {
        width: 100%;
        background: var(--accent);
        color: white;
        border: none;
        padding: 16px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        box-shadow: 0 4px 12px var(--accent-glow);
    }

    .login-btn:hover {
        background: var(--accent-light);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px var(--accent-glow);
    }

    .login-error {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        padding: 12px;
        border-radius: 8px;
        font-size: 13px;
        text-align: center;
        margin-bottom: 16px;
        display: none;
        border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 24px 0;
        color: #94a3b8;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid #e2e8f0;
    }

    .divider:not(:empty)::before {
        margin-right: .5em;
    }

    .divider:not(:empty)::after {
        margin-left: .5em;
    }

    .google-btn {
        width: 100%;
        background: #ffffff;
        color: #334155;
        border: 1px solid #cbd5e1;
        padding: 14px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 16px;
    }

    .google-btn:hover {
        background: #f8fafc;
        border-color: #94a3b8;
    }

    .signup-text {
        text-align: center;
        font-size: 14px;
        color: #64748b;
        margin-top: auto;
    }

    .signup-text a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
    }
</style>

<div class="login-wrapper" id="loginContainer">
    <div class="login-card">

        <!-- Top Blue Curved Section -->
        <div class="login-top" style="padding: 40px 30px 60px;">
            <div class="login-top-header" style="justify-content: center; text-align: center; width: 100%;">
                <div style="width: 100%;">
                    <h1 class="login-title" style="font-size: 26px;">Physical Verification Portal</h1>
                </div>
            </div>

            <!-- Thematic Icons Illustration -->
            <div class="login-illustration">
                <i class="fa-solid fa-map-location-dot" style="font-size: 48px; color: rgba(255,255,255,0.9);"></i>
                <i class="fa-solid fa-clipboard-check" style="font-size: 54px; color: #10b981;"></i>
                <i class="fa-solid fa-chart-pie" style="font-size: 48px; color: #f59e0b;"></i>
            </div>

            <!-- The SVG Wave -->
            <svg class="login-wave" viewBox="0 0 1440 250" xmlns="http://www.w3.org/2000/svg"
                preserveAspectRatio="none">
                <path fill="#ffffff" fill-opacity="1"
                    d="M0,192L48,197.3C96,203,192,213,288,213.3C384,213,480,203,576,176C672,149,768,107,864,112C960,117,1056,171,1152,192C1248,213,1344,203,1392,197.3L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z">
                </path>
            </svg>
        </div>

        <!-- Bottom Form Section -->
        <div class="login-bottom">
            <div class="login-error" id="loginErrorMsg">Invalid credentials.</div>

            <form id="loginForm" onsubmit="event.preventDefault(); handleLoginSubmit();">
                <div class="login-form-group">
                    <label class="login-label" for="loginUserId">User ID</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="text" id="loginUserId" class="login-input" placeholder="Enter your User ID"
                            required autocomplete="username">
                        <i class="fa-solid fa-circle-check input-success-icon"></i>
                    </div>
                </div>

                <div class="login-form-group">
                    <label class="login-label" for="loginPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" class="login-input" placeholder="Password" required
                            autocomplete="current-password">
                    </div>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-pwd"
                        onclick="alert('Please contact the Administrator to reset your password.')">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="loginBtnText">Login Now</span>
                    <i class="fa-solid fa-arrow-right" id="loginBtnArrow"></i>
                    <div class="spinner" id="loginSpinner"></div>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    function handleLoginSubmit() {
        const userId = document.getElementById('loginUserId').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (!userId || !password) return;

        const btnText = document.getElementById('loginBtnText');
        const btnArrow = document.getElementById('loginBtnArrow');
        const spinner = document.getElementById('loginSpinner');
        const errorMsg = document.getElementById('loginErrorMsg');
        const submitBtn = document.getElementById('loginBtn');

        // UI Loading state
        btnText.style.display = 'none';
        btnArrow.style.display = 'none';
        spinner.style.display = 'block';
        submitBtn.disabled = true;
        errorMsg.style.display = 'none';

        google.script.run
            .withSuccessHandler(function (response) {
                if (response.success) {
                    sessionStorage.setItem('cdf_auth_token', response.token);
                    sessionStorage.setItem('cdf_user_name', response.user.name);
                    sessionStorage.setItem('cdf_user_role', response.user.role);

                    document.getElementById('loginContainer').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loginContainer').style.display = 'none';
                        initializeApplication(response.user);
                    }, 400);
                } else {
                    errorMsg.textContent = response.message || 'Authentication failed.';
                    errorMsg.style.display = 'block';
                    btnText.style.display = 'block';
                    btnArrow.style.display = 'block';
                    spinner.style.display = 'none';
                    submitBtn.disabled = false;
                }
            })
            .withFailureHandler(function (error) {
                errorMsg.textContent = 'Server error: ' + (error.message || error);
                errorMsg.style.display = 'block';
                btnText.style.display = 'block';
                btnArrow.style.display = 'block';
                spinner.style.display = 'none';
                submitBtn.disabled = false;
            })
            .loginUser(userId, password);
    }
</script>
